services:
  db:
    image: postgres:14
    environment:
      TZ: America/Sao_Paulo
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
     - '5432:5432'
    expose:
     - '5432'
  
  web:
    build: .
    stdin_open: true
    tty: true
    entrypoint: config/setup_app.sh
    command: bash -c "rails s -p 3000 -b '0.0.0.0'"
    environment:
      TZ: America/Sao_Paulo
    env_file:
     - ./.env.development
    volumes:
     - .:/home/app/web
    ports:
     - '3000:3000'
    expose:
     - '3000'

  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    environment:
      TZ: America/Sao_Paulo
    env_file:
     - ./.env.development
    volumes:
     - .:/home/app/web